<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbox - SkillTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .new-message-btn {
            background: var(--surface-glass);
            border: none;
            color: var(--text-primary);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        .new-message-btn:hover {
            background: var(--surface-glass-hover);
        }

        .search-container {
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .search-bar {
            background: var(--surface-glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
        }

        .message-list {
            display: flex;
            flex-direction: column;
            padding: 0 10px;
        }

        .message-item {
            display: flex;
            align-items: center;
            padding: 15px 10px;
            border-radius: 15px;
            transition: background 0.3s;
            cursor: pointer;
        }

        .message-item:hover {
            background: var(--surface-glass);
        }

        .msg-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin-right: 15px;
            position: relative;
        }
        
        .msg-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #00e676;
            border: 2px solid var(--bg-dark);
            border-radius: 50%;
        }

        .msg-content {
            flex: 1;
            overflow: hidden;
        }

        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .msg-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .msg-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .msg-preview {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .msg-preview.unread {
            color: var(--text-primary);
            font-weight: 500;
        }

        .unread-badge {
            background: var(--accent-color);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <header class="page-header">
            <div style="width: 35px;"></div> <!-- Spacer -->
            <h1>Inbox</h1>
            <button class="new-message-btn"><i class="fa-solid fa-pen-to-square"></i></button>
        </header>

        <div class="search-container">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass text-secondary"></i>
                <input type="text" placeholder="Search messages...">
            </div>
        </div>

        <main class="content-area" style="padding-top: 0;">
            <div class="message-list">
                
                <!-- Message 1 -->
                <div class="message-item">
                    <div class="msg-avatar">
                        <img src="https://ui-avatars.com/api/?name=Sarah+Smith&background=FF2E93&color=fff" alt="User">
                        <div class="online-dot"></div>
                    </div>
                    <div class="msg-content">
                        <div class="msg-header">
                            <span class="msg-name">Sarah Smith</span>
                            <span class="msg-time">Just now</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="msg-preview unread">Loved your last video on React!</span>
                            <span class="unread-badge">1</span>
                        </div>
                    </div>
                </div>

                <!-- Message 2 -->
                <div class="message-item">
                    <div class="msg-avatar">
                        <img src="https://ui-avatars.com/api/?name=David+Chen&background=00F2FE&color=fff" alt="User">
                    </div>
                    <div class="msg-content">
                        <div class="msg-header">
                            <span class="msg-name">David Chen</span>
                            <span class="msg-time">2h ago</span>
                        </div>
                        <div class="msg-preview">Do you offer 1-on-1 mentorship?</div>
                    </div>
                </div>

                <!-- Message 3 -->
                <div class="message-item">
                    <div class="msg-avatar">
                        <img src="https://ui-avatars.com/api/?name=Tech+Academy&background=4FACFE&color=fff" alt="User">
                        <div class="online-dot"></div>
                    </div>
                    <div class="msg-content">
                        <div class="msg-header">
                            <span class="msg-name">Tech Academy <i class="fa-solid fa-circle-check verify-badge" style="font-size: 0.8rem;"></i></span>
                            <span class="msg-time">Yesterday</span>
                        </div>
                        <div class="msg-preview">We would love to collaborate.</div>
                    </div>
                </div>

                <!-- Message 4 -->
                <div class="message-item">
                    <div class="msg-avatar">
                        <img src="https://ui-avatars.com/api/?name=Emma+UX&background=7B2CBF&color=fff" alt="User">
                    </div>
                    <div class="msg-content">
                        <div class="msg-header">
                            <span class="msg-name">Emma UX</span>
                            <span class="msg-time">Mon</span>
                        </div>
                        <div class="msg-preview">Sent a video.</div>
                    </div>
                </div>

            </div>
        </main>

        <!-- Bottom Navigation Bar -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="discover.html" class="nav-item">
                <i class="fa-solid fa-compass"></i>
                <span>Discover</span>
            </a>
            <a href="upload.html" class="nav-item upload-btn">
                <div class="upload-icon-wrapper">
                    <i class="fa-solid fa-plus"></i>
                </div>
            </a>
            <a href="inbox.html" class="nav-item active">
                <i class="fa-solid fa-message"></i>
                <span>Inbox</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>
</body>
</html>
