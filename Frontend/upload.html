<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload - SkillTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(0, 242, 254, 0.05);
        }
        .upload-area i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .form-control {
            width: 100%;
            background: var(--surface-glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
        }
        .form-control:focus {
            border-color: var(--primary-color);
        }
        textarea.form-control {
            resize: none;
            height: 100px;
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-darker);
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,242,254,0.3);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <header class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="color: white;"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>Create</h1>
            <i class="fa-solid fa-gear" style="color: transparent;"></i> <!-- spacer -->
        </header>

        <main class="content-area">
            <form id="uploadForm">
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('videoFile').click()" style="cursor: pointer;">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <h3 style="color: white; margin-bottom: 5px;">Tap to upload video</h3>
                    <p>MP4 or WebM (Max 10 mins)</p>
                    <input type="file" id="videoFile" accept="video/mp4,video/webm" style="display: none;" required>
                </div>
                
                <div id="fileSelected" style="display:none; color: var(--primary-color); margin-bottom: 20px; text-align: center; font-weight: bold;"></div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="videoTitle" class="form-control" placeholder="What will they learn? #hashtags" required></textarea>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="videoCategory" class="form-control">
                        <option>Motivation & Mindset</option>
                        <option>Courses & Academics</option>
                        <option>Kids Special (Under 12)</option>
                        <option>Youth Trends</option>
                        <option>Farming & Agriculture</option>
                        <option>DIY & Gardening</option>
                        <option>World & Culture</option>
                        <option>Tech & Coding</option>
                        <option>Business & Finance</option>
                    </select>
                </div>

                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                    <div>
                        <div style="font-weight: 500;">Monetization</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">Allow ads on this video</div>
                    </div>
                    <div style="width: 40px; height: 20px; background: var(--primary-color); border-radius: 10px; position: relative;">
                        <div style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 2px; right: 2px;"></div>
                    </div>
                </div>

                <div id="uploadStatus" style="display:none; color: var(--primary-color); margin-bottom: 15px; text-align: center;">Uploading... Please wait.</div>

                <button type="submit" class="btn-submit">Post to SkillTok</button>
            </form>
        </main>
        
        <script>
            const fileInput = document.getElementById('videoFile');
            const fileSelectedMsg = document.getElementById('fileSelected');
            
            fileInput.addEventListener('change', () => {
                if(fileInput.files.length > 0) {
                    fileSelectedMsg.style.display = 'block';
                    fileSelectedMsg.innerText = "Selected: " + fileInput.files[0].name;
                }
            });

            document.getElementById('uploadForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (fileInput.files.length === 0) {
                    alert("Please select a video file.");
                    return;
                }
                
                const formData = new FormData();
                formData.append('video', fileInput.files[0]);
                formData.append('title', document.getElementById('videoTitle').value);
                formData.append('category', document.getElementById('videoCategory').value);
                
                const statusDiv = document.getElementById('uploadStatus');
                statusDiv.style.display = 'block';
                statusDiv.innerText = "Uploading... Please wait.";
                
                try {
                    const res = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        statusDiv.style.color = "#00e676";
                        statusDiv.innerText = "Upload successful! Redirecting...";
                        setTimeout(() => window.location.href = '/', 1000);
                    } else {
                        statusDiv.style.color = "#ff4d4d";
                        statusDiv.innerText = "Upload failed: " + data.message;
                    }
                } catch (err) {
                    statusDiv.style.color = "#ff4d4d";
                    statusDiv.innerText = "Network error during upload.";
                }
            });
        </script>

        <!-- Bottom Navigation Bar -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="discover.html" class="nav-item">
                <i class="fa-solid fa-compass"></i>
                <span>Discover</span>
            </a>
            <a href="upload.html" class="nav-item active upload-btn">
                <div class="upload-icon-wrapper" style="box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
                    <i class="fa-solid fa-plus"></i>
                </div>
            </a>
            <a href="inbox.html" class="nav-item">
                <i class="fa-solid fa-message"></i>
                <span>Inbox</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>
</body>
</html>
