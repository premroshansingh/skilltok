<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SkillTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: var(--surface-glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .login-box h2 {
            font-family: 'Outfit', sans-serif;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .login-box p {
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border 0.3s;
        }
        .form-control:focus {
            border-color: var(--primary-color);
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-darker);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,242,254,0.3);
            transition: transform 0.2s;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
        .demo-creds {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container" style="background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800&q=80') center/cover;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 17, 32, 0.85);"></div>
        
        <div class="login-container" style="position: relative; z-index: 1;">
            <div style="margin-bottom: 32px; display: flex; align-items: center; justify-content: center; gap: 12px;">
                <div style="width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #00f2fe, #ff0844); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,242,254,0.4);">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3C9.5 3 8 5 8 7C6.5 7 5 8.5 5 10.5C5 12.5 6.5 14 8 14H9V16H7C5.3 16 4 17.3 4 19V21H20V19C20 17.3 18.7 16 17 16H15V14H16C17.5 14 19 12.5 19 10.5C19 8.5 17.5 7 16 7C16 5 14.5 3 12 3Z" fill="white" opacity="0.9"/>
                        <polygon points="10,9 10,15 16,12" fill="white"/>
                    </svg>
                </div>
                <span style="font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SkillTok</span>
            </div>
            
            <div class="login-box">
                <h2>Welcome Back</h2>
                <p>Log in to continue learning</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" class="form-control" required placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="Enter password">
                    </div>
                    <div id="errorMsg" class="error-msg">Invalid credentials. Try again.</div>
                    
                    <button type="submit" class="btn-primary">Log In</button>
                </form>
                
                <div style="margin-top: 15px; font-size: 0.85rem; color: var(--text-secondary);">
                    Don't have an account? <a href="/signup" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const res = await fetch(window.CONFIG.API_URL + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userHandle', data.user.handle);
                    window.location.href = '/';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = data.message || "Invalid credentials";
                }
            } catch (err) {
                console.error(err);
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Connection error.";
            }
        });
    </script>
</body>
</html>
